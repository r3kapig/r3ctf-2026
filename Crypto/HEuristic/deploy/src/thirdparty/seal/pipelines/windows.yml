steps:
- task: UseDotNet@2
  displayName: 'Get .NET 10.0 SDK'
  inputs:
    packageType: 'sdk'
    version: '10.0.x'
    installationPath: $(Agent.ToolsDirectory)/dotnet

- task: DotNetCoreCLI@2
  displayName: "Install .NET iOS workflow"
  inputs:
    command: 'custom'
    custom: 'workload'
    arguments: 'install ios'

- task: CMake@1
  displayName: 'Configure SEAL'
  inputs:
    cmakeArgs: .. -DCMAKE_BUILD_TYPE=${{ parameters.configuration }} -DSEAL_BUILD_DEPS=ON -DSEAL_BUILD_TESTS=ON -DSEAL_BUILD_EXAMPLES=ON -DSEAL_BUILD_SEAL_C=ON -DSEAL_SECURE_COMPILE_OPTIONS=ON
    workingDirectory: '$(Build.SourcesDirectory)/build'

- task: MSBuild@1
  displayName: 'Build SEAL'
  inputs:
    solution: '$(Build.SourcesDirectory)/build/seal.sln'
    msbuildArchitecture: 'x64'
    platform: 'x64'
    configuration: '${{ parameters.configuration }}'
    msbuildVersion: 'latest'

- task: VSTest@2
  displayName: 'VsTest - native tests'
  inputs:
    testAssemblyVer2: |
        **\${{ parameters.configuration }}\*test*.dll
        **\${{ parameters.configuration }}\*test*.exe
        !**\obj\**
    platform: 'x64'
    configuration: ${{ parameters.configuration }}
    diagnosticsEnabled: True

- task: DotNetCoreCLI@2
  displayName: 'Restore SEALNet'
  inputs:
    command: 'restore'
    projects: '$(Build.SourcesDirectory)/build/dotnet/SEALNet.sln'

- task: DotNetCoreCLI@2
  displayName: 'Build SEALNet'
  inputs:
    command: 'build'
    projects: '$(Build.SourcesDirectory)/build/dotnet/SEALNet.sln'
    arguments: '--configuration ${{ parameters.configuration }} --no-restore'

- task: DotNetCoreCLI@2
  displayName: 'Test SEALNet'
  inputs:
    command: 'test'
    projects: '$(Build.SourcesDirectory)/build/dotnet/tests/SEALNetTest.csproj'
    arguments: '--configuration ${{ parameters.configuration }} --no-build'

- ${{ if eq(parameters.configuration, 'Release') }}:
  - task: DotNetCoreCLI@2
    displayName: 'Restore SEALNet for iOS'
    inputs:
      command: 'custom'
      custom: 'restore'
      arguments: '$(Build.SourcesDirectory)/build/dotnet/src/SEALNet.csproj -p:BuildIOS=true'

  - task: DotNetCoreCLI@2
    displayName: 'Build SEALNet for iOS'
    inputs:
      command: 'build'
      projects: '$(Build.SourcesDirectory)/build/dotnet/src/SEALNet.csproj'
      arguments: '--configuration ${{ parameters.configuration }} --no-restore -p:BuildIOS=true'

  - task: PublishSymbols@2
    displayName: 'Publish symbols path'
    inputs:
      searchPattern: '**\bin\**\*.pdb'
      PublishSymbols: false
    continueOnError: true

- task: CopyFiles@2
  displayName: 'Copy Files to: $(Build.ArtifactStagingDirectory)'
  inputs:
    SourceFolder: '$(Build.SourcesDirectory)'
    Contents: '**\${{ parameters.configuration }}\**\?(*.exe|*.dll|*.lib|*.xml)'
    TargetFolder: '$(Build.ArtifactStagingDirectory)'

- task: CopyFiles@2
  displayName: 'Copy NuSpec File to: $(Build.ArtifactStagingDirectory)'
  inputs:
    SourceFolder: '$(Build.SourcesDirectory)\build\dotnet\nuget\'
    Contents: 'SEALNet-multi.nuspec'
    TargetFolder: '$(Build.ArtifactStagingDirectory)\dotnet\nuget\'

- task: CopyFiles@2
  displayName: 'Copy Targets File to: $(Build.ArtifactStagingDirectory)'
  inputs:
    SourceFolder: '$(Build.SourcesDirectory)\build\dotnet\nuget\'
    Contents: 'SEALNet.targets'
    TargetFolder: '$(Build.ArtifactStagingDirectory)\dotnet\nuget\'

- task: PublishBuildArtifacts@1
  displayName: 'Publish Artifact: drop'
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)'
    artifactName: windows-drop

- task: CredScan@3

- task: CodeQL3000Init@0
- task: CodeQL3000Finalize@0

- task: ComponentGovernanceComponentDetection@0
  inputs:
    scanType: 'Register'
    verbosity: 'Verbose'
    alertWarningLevel: 'High'

- task: PublishSecurityAnalysisLogs@3
  inputs:
    ArtifactName: 'CodeAnalysisLogs'
    ArtifactType: 'Container'
    PublishProcessedResults: true
    AllTools: true
    ToolLogsNotFoundAction: 'Standard'
