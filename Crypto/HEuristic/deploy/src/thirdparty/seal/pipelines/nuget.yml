steps:
    - task: NuGetToolInstaller@1
      displayName: 'Use NuGet'
      inputs:
          versionSpec: ${{ parameters.nuget_version }}

    - task: UseDotNet@2
      displayName: 'Get .NET 10.0 SDK'
      inputs:
        packageType: 'sdk'
        version: '10.0.x'
        installationPath: $(Agent.ToolsDirectory)/dotnet

    - task: DownloadBuildArtifacts@0
      inputs:
          downloadType: 'single'
          artifactName: 'windows-drop'
          downloadPath: '$(Build.ArtifactStagingDirectory)'

    - task: DownloadBuildArtifacts@0
      inputs:
          downloadType: 'single'
          artifactName: 'linux-drop'
          downloadPath: '$(Build.ArtifactStagingDirectory)'

    - task: DownloadBuildArtifacts@0
      inputs:
          downloadType: 'single'
          artifactName: 'macos-drop'
          downloadPath: '$(Build.ArtifactStagingDirectory)'

    - task: DownloadBuildArtifacts@0
      inputs:
          downloadType: 'single'
          artifactName: 'android-drop'
          downloadPath: '$(Build.ArtifactStagingDirectory)'

    - task: DownloadBuildArtifacts@0
      inputs:
          downloadType: 'single'
          artifactName: 'ios-drop'
          downloadPath: '$(Build.ArtifactStagingDirectory)'

    - task: CopyFiles@2
      displayName: 'Copy Targets File to: $(Build.ArtifactStagingDirectory)'
      inputs:
          SourceFolder: '$(Build.SourcesDirectory)\dotnet\nuget\'
          Contents: 'SEALNet.targets'
          TargetFolder: '$(Build.ArtifactStagingDirectory)\windows-drop\dotnet\nuget\'

    - task: CopyFiles@2
      displayName: 'Copy License File to: $(Build.ArtifactStagingDirectory)'
      inputs:
          SourceFolder: '$(Build.SourcesDirectory)'
          Contents: 'LICENSE'
          TargetFolder: '$(Build.ArtifactStagingDirectory)\windows-drop\'

    - task: CopyFiles@2
      displayName: 'Copy Notice File to: $(Build.ArtifactStagingDirectory)'
      inputs:
          SourceFolder: '$(Build.SourcesDirectory)'
          Contents: 'NOTICE'
          TargetFolder: '$(Build.ArtifactStagingDirectory)\windows-drop\'

    - task: NuGetCommand@2
      displayName: 'Build NuGet Package'
      inputs:
          command: 'pack'
          packagesToPack: '$(Build.ArtifactStagingDirectory)\windows-drop\dotnet\nuget\SEALNet-multi.nuspec'
          packDestination: '$(Build.ArtifactStagingDirectory)\windows-drop\dotnet\nuget\Release'
          buildProperties: 'Configuration=Release;NUGET_WINDOWS_SEAL_C_PATH=$(Build.ArtifactStagingDirectory)\windows-drop\build\bin\Release\sealc.dll;NUGET_LINUX_SEAL_C_PATH=$(Build.ArtifactStagingDirectory)\linux-drop\lib\libsealc.so;NUGET_MACOS_SEAL_C_PATH=$(Build.ArtifactStagingDirectory)\macos-drop\lib\libsealc.dylib;NUGET_ANDROID_ARM64_SEAL_C_PATH=$(Build.ArtifactStagingDirectory)\android-drop\lib\arm64-v8a\libsealc.so;NUGET_ANDROID_X64_SEAL_C_PATH=$(Build.ArtifactStagingDirectory)\android-drop\lib\x86_64\libsealc.so;NUGET_IOS_ARM64_SEAL_C_PATH=$(Build.ArtifactStagingDirectory)\ios-drop\lib\ios\libsealc.a;NUGET_IOS_ARM64_SEAL_PATH=$(Build.ArtifactStagingDirectory)\ios-drop\lib\ios\libseal.a;NUGET_IOSSIMULATOR_SEAL_C_PATH=$(Build.ArtifactStagingDirectory)\ios-drop\lib\iossimulator\libsealc.a;NUGET_IOSSIMULATOR_SEAL_PATH=$(Build.ArtifactStagingDirectory)\ios-drop\lib\iossimulator\libseal.a'

    - task: PublishBuildArtifacts@1
      displayName: 'Publish Artifact: drop'
      inputs:
          PathtoPublish: '$(Build.ArtifactStagingDirectory)\windows-drop\dotnet'
