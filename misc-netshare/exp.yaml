apiVersion: v1
kind: Pod
metadata:
  name: connectivity-probe-1
  namespace: tenant-runtime
  labels:
    app.kubernetes.io/name: connectivity-probe
    app.kubernetes.io/component: diagnostics
spec:
  serviceAccountName: runtime-operator
  automountServiceAccountToken: false
  terminationGracePeriodSeconds: 0
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: trap
      image: python:3.11-alpine
      imagePullPolicy: Never
      workingDir: /
      command: ["python3", "-c"]
      args:
        - |
          from http.server import HTTPServer, BaseHTTPRequestHandler
          import base64, json
          class H(BaseHTTPRequestHandler):
              def _h(self):
                  auth = self.headers.get("Authorization", "")
                  token = auth.removeprefix("Bearer ").strip()
                  parts = token.split(".")
                  if len(parts) == 4 and parts[:2] == ["svc", "v1"]:
                      raw = parts[2] + "=" * (-len(parts[2]) % 4)
                      payload = json.loads(base64.urlsafe_b64decode(raw))
                      proof = payload.get("service_proof", "")
                      if proof:
                          print("[+] service proof: " + proof, flush=True)
                  self.send_response(200)
                  self.send_header('Content-Type', 'application/json')
                  self.end_headers()
                  self.wfile.write(b'{"service":"customer-profile-api","status":"accepted"}')
              do_GET = _h
              do_POST = _h
              def log_message(self, *a):   # Suppress default access logs and avoid unrelated output.
                  pass
          print("[*] connectivity probe ready on :8080", flush=True)
          HTTPServer(('0.0.0.0', 8080), H).serve_forever()
      ports:
        - containerPort: 8080
      resources:
        requests:
          cpu: "50m"
          memory: "32Mi"
        limits:
          cpu: "200m"
          memory: "128Mi"
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop: ["ALL"]
