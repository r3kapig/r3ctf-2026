name: minemaze

services:
  server:
    image: registry.ctf2026.r3kapig.com/r3ctf_2026_6a511700/minemaze:latest
    container_name: minemaze
    working_dir: /server
    stdin_open: true
    tty: true
    ports:
      - "${MC_PORT:-25565}:25565"
    environment:
      INIT_MEMORY: "${INIT_MEMORY:-1G}"
      MAX_MEMORY: "${MAX_MEMORY:-3G}"
      JAVA_OPTS: "${JAVA_OPTS:-}"
      FLAG: "${FLAG:?FLAG environment variable is required}"
    restart: unless-stopped
