<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Whisper CTF</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #07080D;
  --glass:       rgba(17,19,27,.72);
  --glass-soft:  rgba(255,255,255,.05);
  --glass-line:  rgba(255,255,255,.08);
  --grad:        linear-gradient(135deg,#FF8A5B,#FF4D88,#B15CFF);
  --accent:      #FF5C8A;
  --teal:        #3DD9C0;
  --text:        #F2F3F8;
  --dim:         #9AA0B4;
  --faint:       #5C6376;
  --radius-lg:   18px;
  --radius-md:   12px;
  --radius-sm:   8px;
  --shadow:      0 8px 40px rgba(0,0,0,.55);
}

html, body {
  height: 100%;
  font-family: -apple-system, 'Segoe UI', Roboto, Inter, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

.aurora { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
.aurora-blob {
  position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.18;
  animation: drift linear infinite;
}
.aurora-blob:nth-child(1) { width: 520px; height: 520px; background: #FF5C8A; top: -120px; left: -80px; animation-duration: 22s; }
.aurora-blob:nth-child(2) { width: 420px; height: 420px; background: #B15CFF; bottom: -100px; right: -60px; animation-duration: 27s; animation-direction: reverse; }
.aurora-blob:nth-child(3) { width: 340px; height: 340px; background: #FF8A5B; top: 40%; left: 55%; animation-duration: 19s; }
@keyframes drift {
  0%   { transform: translate(0, 0) scale(1); }
  33%  { transform: translate(30px, -40px) scale(1.04); }
  66%  { transform: translate(-20px, 30px) scale(0.97); }
  100% { transform: translate(0, 0) scale(1); }
}

.page { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }

.topbar {
  width: 100%; display: flex; align-items: center; justify-content: space-between;
  padding: 18px 28px; border-bottom: 1px solid var(--glass-line);
  background: rgba(7,8,13,.60); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  position: sticky; top: 0; z-index: 10;
}
.brand { display: flex; align-items: center; gap: 10px; font-size: 1.15rem; font-weight: 700; letter-spacing: -.01em; }
.brand-mark {
  width: 32px; height: 32px; border-radius: 9px; background: var(--grad);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: #fff; font-weight: 800; flex-shrink: 0;
  box-shadow: 0 2px 12px rgba(177,92,255,.35);
}
.brand-name { background: var(--grad); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.topbar-right { display: flex; align-items: center; gap: 12px; color: var(--dim); font-size: 0.88rem; }
.team-label { font-weight: 600; color: var(--text); max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.container { width: 100%; max-width: 680px; padding: 40px 20px 80px; flex: 1; }

.card {
  background: var(--glass); border: 1px solid var(--glass-line); border-radius: var(--radius-lg);
  padding: 28px 32px; backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  box-shadow: var(--shadow);
}

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 11px 24px; border-radius: var(--radius-md); font-size: 0.92rem; font-weight: 600;
  cursor: pointer; border: none; text-decoration: none; transition: opacity .15s, transform .1s;
  font-family: inherit;
}
.btn:active { transform: scale(.97); }
.btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
.btn-primary { background: var(--grad); color: #fff; box-shadow: 0 4px 20px rgba(255,77,136,.28); }
.btn-primary:hover { opacity: .88; }
.btn-primary:disabled { background: rgba(255,255,255,.08); color: var(--faint); cursor: not-allowed; box-shadow: none; }
.btn-ghost { background: var(--glass-soft); border: 1px solid var(--glass-line); color: var(--dim); }
.btn-ghost:hover { color: var(--text); border-color: rgba(255,255,255,.18); }
.btn-danger { background: rgba(231,76,60,.15); border: 1px solid rgba(231,76,60,.3); color: #e74c3c; }
.btn-danger:hover { background: rgba(231,76,60,.25); }
.btn-icon {
  padding: 7px 14px; font-size: 0.8rem; border-radius: var(--radius-sm);
  background: var(--glass-soft); border: 1px solid var(--glass-line); color: var(--dim); cursor: pointer;
  font-family: 'JetBrains Mono', 'Fira Mono', 'Consolas', monospace; transition: background .15s, color .15s;
}
.btn-icon:hover { background: rgba(255,255,255,.1); color: var(--text); }

.field-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: .07em; color: var(--faint); margin-bottom: 6px; }
.field-row { display: flex; align-items: center; gap: 10px; background: var(--glass-soft); border: 1px solid var(--glass-line); border-radius: var(--radius-md); padding: 10px 14px; }
.field-val { flex: 1; font-family: 'JetBrains Mono', 'Fira Mono', 'Consolas', monospace; font-size: 0.88rem; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.status-row { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
.dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 0 2px rgba(255,255,255,.08); }
.dot-green  { background: #3DD9C0; box-shadow: 0 0 8px #3DD9C0; }
.dot-yellow { background: #f39c12; }
.dot-gray   { background: var(--faint); }
.dot-red    { background: #e74c3c; }
.status-text { font-weight: 600; font-size: 0.95rem; }

.countdown {
  font-family: 'JetBrains Mono', 'Fira Mono', 'Consolas', monospace;
  font-size: 2.4rem; font-weight: 700; background: var(--grad);
  -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; line-height: 1;
}
.countdown-label { font-size: 0.78rem; color: var(--dim); margin-top: 4px; text-transform: uppercase; letter-spacing: .06em; }

@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .35; } }
.pulse-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin: 0 3px; animation: pulse 1.4s ease-in-out infinite; }
.pulse-dot:nth-child(2) { animation-delay: .2s; }
.pulse-dot:nth-child(3) { animation-delay: .4s; }

.divider { border: none; border-top: 1px solid var(--glass-line); margin: 24px 0; }
.notice { font-size: 0.82rem; color: var(--dim); line-height: 1.5; }
.notice a { color: var(--accent); text-decoration: none; }
.notice a:hover { text-decoration: underline; }
.tagline { color: var(--dim); font-size: 0.92rem; }
.stack { display: flex; flex-direction: column; gap: 16px; }
.copy-ok { color: var(--teal) !important; }

@media (max-width: 480px) {
  .card { padding: 22px 18px; }
  .topbar { padding: 14px 16px; }
  .countdown { font-size: 1.8rem; }
}
</style>
</head>
<body>
<div class="aurora">
  <div class="aurora-blob"></div>
  <div class="aurora-blob"></div>
  <div class="aurora-blob"></div>
</div>
<div class="page">
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">W</div>
      <span class="brand-name">Whisper</span>
    </div>
    <div class="topbar-right">
      <span class="team-label" id="team-label">Team {{ team_id }}</span>
    </div>
  </header>
  <div class="container">
    <div id="panel"></div>
  </div>
</div>

<script>
function copyField(id, btn) {
  var el = document.getElementById(id);
  if (!el) return;
  var text = el.getAttribute('data-val') || el.innerText || el.textContent;
  var orig = btn.textContent;
  navigator.clipboard.writeText(text).then(function() {
    btn.textContent = 'Copied!'; btn.classList.add('copy-ok');
    setTimeout(function() { btn.textContent = orig; btn.classList.remove('copy-ok'); }, 1500);
  }).catch(function() {
    var ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = 'Copied!';
    setTimeout(function() { btn.textContent = orig; }, 1500);
  });
}

function api(path, method) {
  return fetch(path, { method: method || 'GET' });
}
function fmt(s) {
  s = Math.max(0, Math.floor(s));
  var m = Math.floor(s / 60), ss = s % 60;
  return (m < 10 ? '0' : '') + m + ':' + (ss < 10 ? '0' : '') + ss;
}
function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

var countdownTimer = null;
function startCountdown(secs, el, onZero) {
  if (countdownTimer) clearInterval(countdownTimer);
  el.textContent = fmt(secs);
  countdownTimer = setInterval(function() {
    secs--;
    if (secs <= 0) {
      el.textContent = '00:00';
      clearInterval(countdownTimer);
      if (onZero) onZero();
      return;
    }
    el.textContent = fmt(secs);
  }, 1000);
}

function renderLeased(d) {
  var safeHandle = escapeHtml(d.victim_handle || '');
  return '<div class="card">' +
    '<div class="status-row"><div class="dot dot-green"></div><span class="status-text">Instance active</span></div>' +
    '<div class="stack">' +
      '<div><div class="field-label">Target handle</div>' +
        '<div class="field-row"><span class="field-val" id="field-handle" data-val="' + safeHandle + '">' + safeHandle + '</span>' +
        '<button class="btn-icon" onclick="copyField(\'field-handle\',this)">Copy</button></div></div>' +
      '<div><div class="field-label">Flag format</div>' +
        '<div class="field-row"><span class="field-val">R3CTF{...}</span></div></div>' +
      '<div><div class="field-label">Download app</div>' +
        '<a class="btn btn-ghost" href="/download/whisper.apk" style="align-self:flex-start;">Download whisper.apk</a></div>' +
    '</div>' +
    '<hr class="divider">' +
    '<div style="margin-bottom:20px;"><div class="field-label">Lease expires in</div>' +
      '<div class="countdown" id="countdown">--:--</div><div class="countdown-label">mm : ss</div></div>' +
    '<button type="button" class="btn btn-danger" id="btn-release">Release instance</button>' +
  '</div>';
}
function renderQueued(d) {
  var pos = d.position != null ? d.position : '?';
  var booting = d.booting || 0, idle = d.idle || 0, total = d.total || d.total_instances || '?';
  var detail = (booting > 0 && idle === 0)
    ? 'Preparing a fresh instance (' + booting + ' device' + (booting !== 1 ? 's' : '') + ' booting)...'
    : 'All ' + total + ' instance' + (total !== 1 ? 's are' : ' is') + ' in use.';
  var eta = '';
  if (d.est_wait_seconds > 0) {
    var w = d.est_wait_seconds >= 120 ? '~' + Math.floor(d.est_wait_seconds/60) + ' min' : '~' + d.est_wait_seconds + 's';
    eta = '<p style="color:var(--faint);font-size:0.82rem;margin-top:8px;">Estimated wait: <strong style="color:var(--dim);">' + w + '</strong></p>';
  }
  return '<div class="card">' +
    '<div class="status-row"><div class="dot dot-yellow"></div><span class="status-text">Waiting in queue</span></div>' +
    '<p style="color:var(--dim);margin-bottom:6px;">' + detail + ' You are at position ' +
      '<strong id="queue-pos" style="color:var(--text);">' + pos + '</strong>. You will be assigned automatically when a slot opens.</p>' +
    eta +
    '<div style="margin-top:20px;">' +
      '<span class="pulse-dot" style="background:var(--accent);"></span>' +
      '<span class="pulse-dot" style="background:var(--accent);"></span>' +
      '<span class="pulse-dot" style="background:var(--accent);"></span>' +
    '</div>' +
  '</div>';
}
function renderRateLimited(d) {
  var notice = d.reason === 'rate_limited'
    ? 'You have reached the maximum number of instances per hour. Try again in ' + (d.retry_after_seconds||0) + 's.'
    : 'Cooldown active: ' + (d.retry_after_seconds||0) + 's remaining before you can request another instance.';
  return '<div class="card">' +
    '<div class="status-row"><div class="dot dot-red"></div><span class="status-text">Rate limited</span></div>' +
    '<p style="color:var(--dim);margin-bottom:16px;">' + notice + '</p>' +
    '<div class="countdown" id="cd-rl" style="font-size:1.6rem;">' + fmt(d.retry_after_seconds||0) + '</div>' +
  '</div>';
}
function renderIdle() {
  return '<div class="card">' +
    '<div class="status-row"><div class="dot dot-gray"></div><span class="status-text">No active instance</span></div>' +
    '<p class="notice" style="margin-bottom:24px;">Spin up a fresh target device to attack. Each instance has an isolated victim account with a randomized handle visible only to your team.</p>' +
    '<button type="button" class="btn btn-primary" id="btn-lease">Request instance</button>' +
    '<div style="height:1px;background:rgba(255,255,255,0.08);margin:24px 0;"></div>' +
    '<div class="field-label">Download app</div>' +
    '<a class="btn btn-ghost" href="/download/whisper.apk" style="align-self:flex-start;">Download whisper.apk</a>' +
  '</div>';
}

var currentState = null;
function render(d) {
  var panel = document.getElementById('panel');
  var s = d.state || 'idle';
  var html;
  if (s === 'leased') html = renderLeased(d);
  else if (s === 'queued') html = renderQueued(d);
  else if (d.rate_limited || d.in_cooldown) html = renderRateLimited(d);
  else html = renderIdle();
  panel.innerHTML = html;
  currentState = s;

  if (s === 'leased') {
    var cd = document.getElementById('countdown');
    startCountdown(d.seconds_left || 0, cd, function() { setTimeout(refresh, 2000); });
    var rb = document.getElementById('btn-release');
    if (rb) rb.onclick = function() {
      rb.disabled = true; rb.textContent = 'Releasing…';
      api('/release','POST').then(refresh).catch(refresh);
    };
  } else if (s === 'idle' && !(d.rate_limited || d.in_cooldown)) {
    var lb = document.getElementById('btn-lease');
    if (lb) lb.onclick = function() {
      lb.disabled = true; lb.textContent = 'Requesting…';
      api('/lease','POST').then(refresh).catch(refresh);
    };
  } else if (d.rate_limited || d.in_cooldown) {
    var rl = document.getElementById('cd-rl');
    startCountdown(d.retry_after_seconds || 0, rl, refresh);
  }
}

function refresh() {
  return api('/status').then(function(r) {
    if (r.status === 401 || r.status === 403) { document.getElementById('panel').innerHTML = '<div class="card"><p class="notice">Forbidden — check your token.</p></div>'; return null; }
    return r.json();
  }).then(function(d) { if (d) render(d); }).catch(function() {});
}

// initial load + polling
refresh();
setInterval(function() {
  api('/status').then(function(r) { return r.json(); }).then(function(d) {
    if (!d) return;
    var s = d.state || 'idle';
    if (s !== currentState) { render(d); return; }
    if (s === 'leased') {
      var cd = document.getElementById('countdown');
      if (cd && d.seconds_left != null) cd.textContent = fmt(d.seconds_left);
    } else if (s === 'queued') {
      var pe = document.getElementById('queue-pos');
      if (pe && d.position != null) pe.textContent = d.position;
    }
  }).catch(function() {});
}, currentState === 'queued' ? 4000 : 10000);
</script>
</body>
</html>
