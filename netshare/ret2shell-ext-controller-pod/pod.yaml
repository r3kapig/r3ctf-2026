# ret.sh per-team instance: the bridge pod. ret.sh launches this when a player
# starts the challenge and injects the env from checker.rx:environ
# (RET2SHELL_TEAM_ID + CONTROLLER_HOST + CONTROLLER_PORT). The pod nc's the
# controller, hands it the team id, and serves the returned kubeconfig on :5000.
# Its single nc connection ties the per-team cluster's lifetime to this pod:
# when ret.sh stops the instance the connection drops and the controller tears
# the cluster down.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: netshare-bridge
  labels:
    app.kubernetes.io/name: netshare-bridge
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: netshare-bridge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: netshare-bridge
    spec:
      containers:
        - name: bridge
          image: netshare-bridge:latest
          ports:
            - containerPort: 5000
          env:
            - name: RET2SHELL_TEAM_ID
              value: "0"
            - name: CONTROLLER_HOST
              value: "127.0.0.1"
            - name: CONTROLLER_PORT
              value: "8888"
          readinessProbe:
            httpGet:
              path: /api/status
              port: 5000
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: netshare-bridge
  labels:
    app.kubernetes.io/name: netshare-bridge
spec:
  selector:
    app.kubernetes.io/name: netshare-bridge
  ports:
    - port: 5000
      targetPort: 5000
