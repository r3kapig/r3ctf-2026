apiVersion: cluster.x-k8s.io/v1beta1
kind: ClusterClass
metadata:
  name: kond
  namespace: default
spec:
  controlPlane:
    machineInfrastructure:
      ref:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
        kind: DockerMachineTemplate
        name: kond-control-plane
    ref:
      apiVersion: controlplane.cluster.x-k8s.io/v1beta1
      kind: KubeadmControlPlaneTemplate
      name: kond-control-plane
  infrastructure:
    ref:
      apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
      kind: DockerClusterTemplate
      name: kond-cluster
  patches:
  - definitions:
    - jsonPatches:
      - op: add
        path: /spec/template/spec/customImage
        valueFrom:
          template: |
            kindest/node:v1.28.15@sha256:a7c05c7ae043a0b8c818f5a06188bc2c4098f6cb59ca7d1856df00375d839251
      selector:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
        kind: DockerMachineTemplate
        matchResources:
          machineDeploymentClass:
            names:
            - default-worker
    - jsonPatches:
      - op: add
        path: /spec/template/spec/customImage
        valueFrom:
          template: |
            kindest/node:v1.28.15@sha256:a7c05c7ae043a0b8c818f5a06188bc2c4098f6cb59ca7d1856df00375d839251
      selector:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
        kind: DockerMachineTemplate
        matchResources:
          controlPlane: true
    description: Pins the patched Kubernetes v1.28.15 kind node image for the
      controlPlane and default-worker machineDeployments. The old v1.28.0 image
      contained runc 1.1.7, which is vulnerable to CVE-2024-21626.
    name: customImage
  workers:
    machineDeployments:
    - class: default-worker
      template:
        bootstrap:
          ref:
            apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
            kind: KubeadmConfigTemplate
            name: kond-default-worker-bootstraptemplate
        infrastructure:
          ref:
            apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
            kind: DockerMachineTemplate
            name: kond-default-worker-machinetemplate
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: DockerClusterTemplate
metadata:
  name: kond-cluster
  namespace: default
spec:
  template:
    spec: {}
---
apiVersion: controlplane.cluster.x-k8s.io/v1beta1
kind: KubeadmControlPlaneTemplate
metadata:
  name: kond-control-plane
  namespace: default
spec:
  template:
    spec:
      kubeadmConfigSpec:
        files:
          - path: /etc/kubernetes/kube-apiserver-admission-pss.yaml
            content: |
              apiVersion: apiserver.config.k8s.io/v1
              kind: AdmissionConfiguration
              plugins:
              - name: PodSecurity
                configuration:
                  apiVersion: pod-security.admission.config.k8s.io/v1
                  kind: PodSecurityConfiguration
                  defaults:
                    enforce: "baseline"
                    enforce-version: "latest"
                    audit: "restricted"
                    audit-version: "latest"
                    warn: "restricted"
                    warn-version: "latest"
                  exemptions:
                    usernames: []
                    runtimeClasses: []
                    namespaces: [kube-system, default]
          # inject local repository cache for all nodes
          - path: /etc/containerd/config.toml
            content: |
              version = 2
              [proxy_plugins]
              [proxy_plugins."fuse-overlayfs"]
                type = "snapshot"
                address = "/run/containerd-fuse-overlayfs.sock"
              [plugins."io.containerd.grpc.v1.cri".containerd]
                discard_unpacked_layers = true
                snapshotter = "overlayfs"
                default_runtime_name = "runc"
              [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc]
                runtime_type = "io.containerd.runc.v2"
                base_runtime_spec = "/etc/containerd/cri-base.json"
                [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc.options]
                  SystemdCgroup = true
              [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.test-handler]
                runtime_type = "io.containerd.runc.v2"
                base_runtime_spec = "/etc/containerd/cri-base.json"
                [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.test-handler.options]
                  SystemdCgroup = true
              [plugins."io.containerd.grpc.v1.cri"]
                sandbox_image = "registry.k8s.io/pause:3.7"
                tolerate_missing_hugepages_controller = true
                restrict_oom_score_adj = false
              [plugins."io.containerd.grpc.v1.cri".registry.mirrors."docker.io"] endpoint = ["http://registry-docker:5000"]
              [plugins."io.containerd.grpc.v1.cri".registry.mirrors."registry.k8s.io"] endpoint = ["http://registry-k8s:5000"]
              [plugins."io.containerd.grpc.v1.cri".registry.mirrors."quay.io"] endpoint = ["http://registry-quay:5000"]
              [plugins."io.containerd.grpc.v1.cri".registry.mirrors."gcr.io"] endpoint = ["http://registry-gcr:5000"]
              [plugins."io.containerd.grpc.v1.cri".registry.mirrors."registry-docker:5000"] endpoint = ["http://registry-docker:5000"]
        # kube-proxy keeps the kubeadm default configuration; syncPeriod and
        # minSyncPeriod are no longer patched. The attack window comes from
        # ghost-service-discovery's delayed EndpointSlice update, not from
        # kube-proxy timing, so patch-kube-proxy.sh and the corresponding
        # postKubeadmCommands call were removed.
        preKubeadmCommands:
          - "systemctl restart containerd"
        clusterConfiguration:
          apiServer:
            certSANs:
            - localhost
            - 127.0.0.1
            - 0.0.0.0
            - host.docker.internal
            - "*.domain.local"
            extraArgs:
              admission-control-config-file: /etc/kubernetes/kube-apiserver-admission-pss.yaml
              # In Kubernetes v1.28, ValidatingAdmissionPolicy is a beta
              # feature that is disabled by default. The admission plugin is
              # enabled by default, but policies only work when both the
              # feature gate and the v1beta1 API are enabled.
              feature-gates: ValidatingAdmissionPolicy=true
              runtime-config: admissionregistration.k8s.io/v1beta1=true
            extraVolumes:
            - hostPath: /etc/kubernetes/kube-apiserver-admission-pss.yaml
              mountPath: /etc/kubernetes/kube-apiserver-admission-pss.yaml
              name: admission-pss
              pathType: File
              readOnly: true
          controllerManager:
            extraArgs:
              enable-hostpath-provisioner: "true"
              # /28 Pod CIDR is the full cluster pool, so kube-controller-manager
              # must allocate a node mask of /28 (default is /24).
              node-cidr-mask-size: "28"
        initConfiguration:
          nodeRegistration: {}
        joinConfiguration:
          nodeRegistration: {}
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: DockerMachineTemplate
metadata:
  name: kond-control-plane
  namespace: default
spec:
  template:
    spec: {}
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: DockerMachineTemplate
metadata:
  name: kond-default-worker-machinetemplate
  namespace: default
spec:
  template:
    spec: {}
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
kind: KubeadmConfigTemplate
metadata:
  name: kond-default-worker-bootstraptemplate
  namespace: default
spec:
  template:
    spec:
      joinConfiguration:
        nodeRegistration: {}
      files:
        # inject local repository cache for all nodes
        - path: /etc/containerd/config.toml
          content: |
            version = 2
            [proxy_plugins]
            [proxy_plugins."fuse-overlayfs"]
              type = "snapshot"
              address = "/run/containerd-fuse-overlayfs.sock"
            [plugins."io.containerd.grpc.v1.cri".containerd]
              discard_unpacked_layers = true
              snapshotter = "overlayfs"
              default_runtime_name = "runc"
            [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc]
              runtime_type = "io.containerd.runc.v2"
              base_runtime_spec = "/etc/containerd/cri-base.json"
              [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc.options]
                SystemdCgroup = true
            [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.test-handler]
              runtime_type = "io.containerd.runc.v2"
              base_runtime_spec = "/etc/containerd/cri-base.json"
              [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.test-handler.options]
                SystemdCgroup = true
            [plugins."io.containerd.grpc.v1.cri"]
              sandbox_image = "registry.k8s.io/pause:3.7"
              tolerate_missing_hugepages_controller = true
              restrict_oom_score_adj = false
            [plugins."io.containerd.grpc.v1.cri".registry.mirrors."docker.io"] endpoint = ["http://registry-docker:5000"]
            [plugins."io.containerd.grpc.v1.cri".registry.mirrors."registry.k8s.io"] endpoint = ["http://registry-k8s:5000"]
            [plugins."io.containerd.grpc.v1.cri".registry.mirrors."quay.io"] endpoint = ["http://registry-quay:5000"]
            [plugins."io.containerd.grpc.v1.cri".registry.mirrors."gcr.io"] endpoint = ["http://registry-gcr:5000"]
            [plugins."io.containerd.grpc.v1.cri".registry.mirrors."registry-docker:5000"] endpoint = ["http://registry-docker:5000"]
      preKubeadmCommands:
        - "systemctl restart containerd"
---
apiVersion: addons.cluster.x-k8s.io/v1beta1
kind: ClusterResourceSet
metadata:
  name: cni-resource-set
  namespace: default
spec:
  clusterSelector:
    matchLabels:
      cni: calico
  resources:
    - name: calico-addon
      kind: ConfigMap
---
apiVersion: addons.cluster.x-k8s.io/v1beta1
kind: ClusterResourceSet
metadata:
  name: callenge-resource-set
  namespace: default
spec:
  clusterSelector:
    matchLabels:
      challenge: challenge
  resources:
    - name: challenge
      kind: ConfigMap
    - name: user
      kind: ConfigMap
