<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Instance Detail</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        color: #333;
      }
      .card {
        width: 90%;
        max-width: 520px;
        background: #fff;
        border-radius: 16px;
        padding: 32px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        text-align: center;
      }
      h1 {
        font-size: 1.5rem;
        margin-bottom: 8px;
      }
      .subtitle {
        color: #888;
        margin-bottom: 24px;
        font-size: 0.9rem;
      }
      .info-row {
        display: flex;
        flex-direction: column;
        margin: 16px 0;
        text-align: left;
      }
      .info-row label {
        font-size: 0.8rem;
        color: #666;
        margin-bottom: 4px;
      }
      .info-row .value {
        font-size: 1rem;
        word-break: break-all;
        background: #f5f7fa;
        padding: 10px 12px;
        border-radius: 8px;
        font-family:
          "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      }
      .url {
        color: #0d6efd;
        text-decoration: none;
      }
      .url:hover {
        text-decoration: underline;
      }
      .empty {
        color: #999;
        font-style: italic;
      }
      button {
        width: 100%;
        margin-top: 24px;
        padding: 14px 20px;
        font-size: 1rem;
        color: #fff;
        background: #0d6efd;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition:
          background 0.2s,
          transform 0.1s;
      }
      button:hover:not(:disabled) {
        background: #0b5ed7;
      }
      button:active:not(:disabled) {
        transform: scale(0.98);
      }
      button:disabled {
        background: #6c757d;
        cursor: not-allowed;
      }
      button.destroy {
        background: #dc3545;
      }
      button.destroy:hover:not(:disabled) {
        background: #bb2d3b;
      }
      .message {
        margin-top: 16px;
        font-size: 0.9rem;
        min-height: 1.2rem;
      }
      .message.error {
        color: #dc3545;
      }
      .message.success {
        color: #198754;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Instance Detail</h1>
      <div class="subtitle">点击按钮申请或查看当前实例状态</div>

      <div class="info-row">
        <label>访问 URL</label>
        <div class="value" id="url">—</div>
      </div>

      <div class="info-row">
        <label>创建时间</label>
        <div class="value" id="created">—</div>
      </div>

      <div class="info-row">
        <label>过期时间</label>
        <div class="value" id="expires">—</div>
      </div>

      <button id="applyBtn" type="button">申请新实例</button>
      <div class="message" id="message"></div>
    </div>

    <script>
      const urlEl = document.getElementById("url");
      const createdEl = document.getElementById("created");
      const expiresEl = document.getElementById("expires");
      const btn = document.getElementById("applyBtn");
      const msg = document.getElementById("message");

      function formatTime(ts) {
        if (!ts) return "—";
        const d = new Date(ts * 1000 || ts);
        if (isNaN(d.getTime())) return String(ts);
        return d.toLocaleString("zh-CN");
      }

      function updateButton(hasInstance) {
        if (hasInstance) {
          btn.textContent = "销毁实例";
          btn.classList.add("destroy");
        } else {
          btn.textContent = "创建实例";
          btn.classList.remove("destroy");
        }
      }

      function render(data) {
        const hasInstance = Boolean(data.url);
        if (hasInstance) {
          urlEl.innerHTML = `<a class="url" href="${data.url}" target="_blank" rel="noopener">${data.url}</a>`;
        } else {
          urlEl.innerHTML = '<span class="empty">暂无实例</span>';
        }
        createdEl.textContent = formatTime(data.created_at);
        expiresEl.textContent = formatTime(data.expires_at);
        updateButton(hasInstance);
      }

      async function loadStatus() {
        try {
          const res = await fetch("/api/status");
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || `status ${res.status}`);
          render(data);
        } catch (e) {
          msg.className = "message error";
          msg.textContent = "获取状态失败：" + e.message;
        }
      }

      async function createInstance() {
        btn.disabled = true;
        msg.className = "message";
        msg.textContent = "创建中…";
        try {
          const res = await fetch("/api/create", { method: "POST" });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || `status ${res.status}`);
          render(data);
          msg.className = "message success";
          msg.textContent = "创建成功";
        } catch (e) {
          msg.className = "message error";
          msg.textContent = "创建失败：" + e.message;
        } finally {
          btn.disabled = false;
        }
      }

      async function deleteInstance() {
        if (!confirm("确认销毁当前实例？")) return;
        btn.disabled = true;
        msg.className = "message";
        msg.textContent = "销毁中…";
        try {
          const res = await fetch("/api/delete", { method: "POST" });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || `status ${res.status}`);
          render(data);
          msg.className = "message success";
          msg.textContent = "销毁成功";
        } catch (e) {
          msg.className = "message error";
          msg.textContent = "销毁失败：" + e.message;
        } finally {
          btn.disabled = false;
        }
      }

      btn.addEventListener("click", () => {
        const hasInstance = urlEl.querySelector("a.url") !== null;
        if (hasInstance) {
          deleteInstance();
        } else {
          createInstance();
        }
      });
      loadStatus();
    </script>
  </body>
</html>
