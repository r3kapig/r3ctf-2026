[supervisord]
nodaemon=true
user=root
logfile=/dev/null
pidfile=/tmp/supervisord.pid
childlogdir=/tmp

[program:papertrail-backend]
command=dotnet PaperTrailDesk.dll
directory=/app
user=appuser
autostart=true
autorestart=true
environment=PAPERTRAIL_URLS="http://0.0.0.0:8080"
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
stopasgroup=true
killasgroup=true
