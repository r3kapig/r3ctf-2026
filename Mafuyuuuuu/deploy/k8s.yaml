# Mafuyuuuuu — single-pod, three-container deployment.
# All three containers (backend / frontend / nginx) share one pod network
# namespace, so nginx proxies to the frontend/backend on 127.0.0.1.
#
# Apply:
#   kubectl apply -f k8s.yaml
# Players reach it on NodePort 30089 (adjust the Service to your platform).

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mafuyuuuuu-nginx-conf
data:
  nginx.conf: |
    worker_processes auto;
    pid /tmp/nginx.pid;

    events {
        worker_connections 1024;
    }

    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;
        access_log /dev/stdout;
        error_log /dev/stderr warn;
        sendfile on;

        # In-pod: frontend / backend are sibling containers on localhost.
        upstream frontend_upstream {
            server 127.0.0.1:4173;
        }
        upstream backend_upstream {
            server 127.0.0.1:8080;
        }

        server {
            listen 8089;
            server_name _;
            client_max_body_size 32m;
            client_body_buffer_size 16m;

            location = /healthz {
                proxy_pass http://backend_upstream;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
            }
            location /api/ {
                proxy_pass http://backend_upstream;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
            }
            location /sekai/ {
                proxy_pass http://backend_upstream;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
            }
            location / {
                proxy_pass http://frontend_upstream;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
            }
        }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mafuyuuuuu
  labels:
    app: mafuyuuuuu
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mafuyuuuuu
  template:
    metadata:
      labels:
        app: mafuyuuuuu
    spec:
      containers:
        - name: backend
          image: registry.ctf2026.r3kapig.com/r3ctf_2026_6a511700/mafuyuuuuu-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            # Per-team dynamic flag. The platform (or you) overrides this at
            # runtime; the backend entrypoint writes it to /flag (read by the
            # setuid /readflag) and scrubs the env.
            - name: FLAG
              value: "r3ctf{test_flag_replace_me}"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi

        - name: frontend
          image: registry.ctf2026.r3kapig.com/r3ctf_2026_6a511700/mafuyuuuuu-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4173
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

        - name: nginx
          image: registry.ctf2026.r3kapig.com/r3ctf_2026_6a511700/mafuyuuuuu-nginx:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8089
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi

      volumes:
        - name: nginx-conf
          configMap:
            name: mafuyuuuuu-nginx-conf

---
apiVersion: v1
kind: Service
metadata:
  name: mafuyuuuuu
spec:
  type: NodePort
  selector:
    app: mafuyuuuuu
  ports:
    - name: http
      port: 8089
      targetPort: 8089
      nodePort: 30089
